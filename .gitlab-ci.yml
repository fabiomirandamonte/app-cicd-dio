stages:
  - build

build_images:
  stage: build
  image: docker:29.4.1

  services:
    - docker:29.4.1-bind
  
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  
  before_script:
    - docker login -u $REGISTRY_USER -p $REGISTRY_PASS

  script:
    - docker build -t fabiomirandamonte/app-cicd-dio:1.0 app/.
    - docker push fabiomirandamonte/app-cicd-dio:1.0
    